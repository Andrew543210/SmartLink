name: SmartLink CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend dependencies
        run: |
          cd smartlink-client
          npm install
          npm run build

      - name: Restore Backend
        run: |
          dotnet restore SmartLink.Api/SmartLink.Api.csproj
          dotnet restore SmartLink.Domain/SmartLink.Domain.csproj
          dotnet restore SmartLink.Tests/SmartLink.Tests.csproj

      - name: Build Backend
        run: dotnet build SmartLink.Api/SmartLink.Api.csproj --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test SmartLink.Tests/SmartLink.Tests.csproj --configuration Release --verbosity normal